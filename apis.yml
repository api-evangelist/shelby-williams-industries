description: >-
  Shelby Williams Industries is the premier designer, manufacturer, and distributor
  of seating products in the hospitality and food service industries. With over
  70 years of experience, the company produces an extensive line of chairs, barstools,
  banquet seating, sofas, and tables made from wood, metal, rattan, and fully
  upholstered materials. Headquartered with US manufacturing in Newport, Tennessee,
  Shelby Williams serves hotels, restaurants, country clubs, senior living facilities,
  and banquet venues worldwide. As a contract furniture manufacturer focused on
  custom B2B orders, Shelby Williams does not expose a public developer API.
